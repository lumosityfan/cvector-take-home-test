name: "Test Python Pytest Workflow"
on: [push, pull_request]
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v2
            - name: Set up Python
              uses: actions/setup-python@v2
              with:
                python-version: 3.8
            - name: Install dependencies
              run: |
                pip install pytest
                pip install -r requirements.txt
            - name: Run tests
              run: pytest